name: Sync Docs to Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone wiki
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/zanemyers/Flybox-2.0.wiki.git wiki

      - name: Copy docs to wiki
        run: |
          for file in docs/*.md; do
            filename=$(basename "$file")

            if [ "$filename" = "index.md" ]; then
              dest="wiki/Home.md"
            else
              # Use the first line as the page name: strip leading #, replace spaces with hyphens
              title=$(head -n1 "$file" | sed 's/^#\+[[:space:]]*//' | sed 's/[[:space:]]/-/g')
              dest="wiki/${title}.md"
            fi

            cp "$file" "$dest"
          done

      - name: Commit and push
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Sync docs from main"
          git push
